<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ഓടെടാ മോനേ ഓട്</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #gameTitle { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; font-size: 20px; z-index: 5; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 10; }
        button { width: 70px; height: 70px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.5); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="gameTitle">ഓടെടാ മോനേ ഓട്</div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <button id="lBtn">LEFT</button>
            <button id="rBtn">RIGHT</button>
        </div>
        <button id="jBtn" style="background: #3498db;">JUMP</button>
    </div>
    <script src="Js/TileGround.js"></script>
    <script src="Js/Actor.js"></script>
    <script src="Js/CollisionHandler.js"></script>
    <script src="Js/Game.js"></script>
</body>
</html>
