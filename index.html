<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Adventure - Level 1</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #87CEEB; 
            width: 100vw; 
            height: 100vh; 
        }
        
        /* Orientation logic for mobile */
        @media screen and (orientation: portrait) {
            body { 
                transform: rotate(90deg); 
                transform-origin: left top; 
                width: 100vh; 
                height: 100vw; 
                position: absolute; 
                top: 0; 
                left: 100%; 
            }
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }

        /* Score Board UI */
        #scoreBoard {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0,0,0,0.5); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-size: 24px; 
            font-family: sans-serif; 
            z-index: 10;
        }

        /* Game Over Screen */
        #gameOver { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 30px; 
            border-radius: 15px; 
            z-index: 100; 
            font-family: sans-serif; 
        }

        /* Mobile Controls */
        .controls { 
            position: absolute; 
            bottom: 15px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 30px; 
            box-sizing: border-box; 
            z-index: 10; 
        }

        button { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 3px solid #fff; 
            background: rgba(0,0,0,0.5); 
            color: white; 
            font-weight: bold; 
            touch-action: manipulation; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="scoreBoard">
        Score: <span id="scoreVal">0</span>
    </div>

    <div id="gameOver">
        <h1 style="margin:0; font-size:40px;">നീ തോറ്റു!</h1>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; font-size:20px; background:#e74c3c; color:white; border:none; border-radius:5px; cursor:pointer;">Retry</button>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <button id="lBtn">LEFT</button>
            <button id="rBtn">RIGHT</button>
        </div>
        <button id="jBtn" style="background:#3498db;">JUMP</button>
    </div>

    <script src="Js/TileGround.js"></script>
    <script src="Js/Actor.js"></script>
    <script src="Js/CollisionHandler.js"></script>
    <script src="Js/Game.js"></script>

</body>
</html>
