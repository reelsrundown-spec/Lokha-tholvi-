<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Ninja Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 15px; }
        button { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.6); color: white; font-weight: bold; font-size: 14px; touch-action: manipulation; }
        button:active { background: #ed4c67; transform: scale(0.9); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="btn-group">
        <button id="lBtn">LEFT</button>
        <button id="rBtn">RIGHT</button>
    </div>
    <div class="btn-group">
        <button id="jBtn" style="background:#3498db;">JUMP</button>
    </div>
</div>

<script src="Js/TileGround.js"></script>
<script src="Js/Actor.js"></script>
<script src="Js/CollisionHandler.js"></script>
<script src="Js/Game.js"></script>
