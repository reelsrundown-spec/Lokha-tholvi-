<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; width: 100vw; height: 100vh; }
        @media screen and (orientation: portrait) {
            body { transform: rotate(90deg); transform-origin: left top; width: 100vh; height: 100vw; position: absolute; top: 0; left: 100%; }
        }
        canvas { display: block; width: 100%; height: 100%; }
        .controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 10; }
        button { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); color: white; font-weight: bold; touch-action: manipulation; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; background:rgba(0,0,0,0.8); color:white; padding:20px; border-radius:15px; z-index:100;">
    <h1 style="margin:0; font-size:40px;">നീ തോറ്റു!</h1>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; font-size:20px; background:#e74c3c; color:white; border:none; border-radius:5px; cursor:pointer;">Retry</button>
    </div>
